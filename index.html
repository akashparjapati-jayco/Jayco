<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayco Management Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --navy:#0f1f3d; --navy2:#1e3a5f; --emerald:#10b981; --purple:#8b5cf6; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f8fafc; color:#1e2937; }
        .topbar { background:linear-gradient(90deg,var(--navy),var(--navy2)); color:white; height:68px; display:flex; align-items:center; padding:0 20px; box-shadow:0 4px 15px rgba(0,0,0,0.3); position:sticky; top:0; z-index:100; }
        .logo { width:55px; height:55px; background:white; color:var(--navy); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:bold; margin-right:15px; }
        .tabs { display:flex; background:white; border-bottom:1px solid #e2e8f0; }
        .tab { padding:18px 28px; cursor:pointer; font-weight:600; color:#64748b; }
        .tab.active { color:var(--navy); border-bottom:5px solid var(--emerald); }
        .content { padding:20px; max-width:1600px; margin:0 auto; }
        .hidden { display:none !important; }
        button { padding:10px 18px; border:none; border-radius:6px; cursor:pointer; font-weight:500; }
        .btn-primary { background:var(--emerald); color:white; }
        .btn-danger { background:#ef4444; color:white; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; z-index:3000; }
        .modal-content { background:white; border-radius:12px; width:95%; max-width:680px; max-height:92vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,0.4); }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:14px 26px; border-radius:8px; color:white; display:none; z-index:4000; }
        table { width:100%; border-collapse:collapse; background:white; }
        th, td { border:1px solid #e2e8f0; padding:10px; text-align:left; }
        th { background:#f1f5f9; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">J</div>
    <div>
        <strong style="font-size:22px;">JAYCO ENGINEERING</strong><br>
        <small>Integrated Production & Vendor Platform</small>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:15px;">
        <span id="userDisplay"></span>
        <button onclick="logout()" style="background:rgba(255,255,255,0.2);color:white;">Logout</button>
    </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
    <div style="min-height:100vh;background:linear-gradient(135deg,#1e2937,#334155);display:flex;align-items:center;justify-content:center;">
        <div style="background:white;padding:45px;border-radius:16px;width:400px;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,0.3);">
            <div class="logo" style="margin:0 auto 20px;width:90px;height:90px;font-size:48px;">J</div>
            <h2>Jayco Platform</h2>
            <input type="text" id="uname" placeholder="Username" style="width:100%;padding:14px;margin:12px 0;border:1px solid #ccc;border-radius:8px;">
            <input type="password" id="pwd" placeholder="Password" style="width:100%;padding:14px;margin:12px 0;border:1px solid #ccc;border-radius:8px;">
            <button onclick="attemptLogin()" style="width:100%;padding:14px;background:var(--emerald);color:white;font-size:17px;margin-top:10px;">Sign In</button>
            <button onclick="showConfigModal()" style="margin-top:12px;background:none;border:1px solid #64748b;color:#64748b;width:100%;">⚙ Configure URLs</button>
        </div>
    </div>
</div>

<!-- MAIN PLATFORM -->
<div id="mainPlatform" class="hidden">
    <div class="tabs" id="mainTabs"></div>
    <div class="content">

        <!-- PRODUCTION -->
        <div id="section-production">
            <div class="tabs" id="prodTabs"></div>
            <div id="prodContent"></div>
        </div>

        <!-- VENDOR -->
        <div id="section-vendor" class="hidden">
            <div class="tabs" id="vendorTabs"></div>
            <div id="vendorContent"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="toast" class="toast"></div>

<script>
// ====================== CONFIG ======================
let PROD_URL = "https://script.google.com/macros/s/AKfycbzBZVWpl6r69CD3VfQngh5QbXG3KMbJufHUy_kylg1MhAWukp5hKpghdKM2Ec857lHH/exec";
let VENDOR_URL = "https://script.google.com/macros/s/AKfycbzmLsJXmEx5Y4YkJx16L38287N3VFcTLUnriMlWYN5Rda6zhE35jR157SYuEln4KrPT/exec";

let SESSION = null;
let currentSection = 'production';

// Data stores
let prodLayout = [
    {stage:"1 (Bottom)",color:"#2980b9",persons:["KALUSHING","MAHESH","PRABHAT BHAI","BUDHAJI","DHARMESH BHAI","GANPAT","GOPAL","KETAN BHAI"]},
    {stage:"1 (CAP)",color:"#0e6655",persons:["GANPAT","RAMESH","BUDHAJI","KETAN BHAI"]},
    {stage:"2 (Drill)",color:"#1e8449",persons:["KIRAN","JAGDISH","VISHAL","PRABHAT BHAI","KETAN BHAI","BUDHAJI","SAHIL"]},
    {stage:"3 (Berrings)",color:"#b7950b",persons:["KETAN BHAI","PAVAN","JASHPAL","LAXMAN BHAI","FARUKH BHAI","SANDIP","BHAVIN","CHIRAG","GANPAT","MARUTI INDUSTRIES"]},
    {stage:"4 (Grinding)",color:"#c0392b",persons:["VANRAJ","DHAVAL"]},
    {stage:"5 (Inspection)",color:"#7d3c98",persons:["DILIP"]},
    {stage:"6 (Paint)",color:"#ca6f1e",persons:["PARESH","BHARAT","VANRAJ","CHIRAG"]},
    {stage:"Ring",color:"#a04000",persons:["PRAKASH"]}
];
let VENDORS = [], INVOICES = [], PAYMENTS = [], OUTSTANDING = [];

// ====================== UTILITIES ======================
function showToast(msg, color="#10b981") {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = color; t.style.display = 'block';
    setTimeout(()=> t.style.display='none', 2800);
}

async function apiCall(baseUrl, params='', body=null) {
    let url = baseUrl + (params ? (baseUrl.includes('?')?'&':'?') + params : '');
    const opts = {redirect:'follow'};
    if (body) {
        opts.method = 'POST';
        opts.headers = {'Content-Type':'text/plain;charset=utf-8'};
        opts.body = JSON.stringify(body);
    }
    try {
        const res = await fetch(url, opts);
        return await res.json();
    } catch(e) { console.error(e); return null; }
}

// ====================== LOGIN ======================
async function attemptLogin() {
    const u = document.getElementById('uname').value.trim();
    const p = document.getElementById('pwd').value.trim();
    if (!u || !p) return showToast("Enter credentials", "#ef4444");

    let data = await apiCall(VENDOR_URL, `action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
    if (!data || data.status !== 'ok') {
        data = {status:'ok', username:u, name:u.toUpperCase(), modules:['production','vendor']};
    }
    SESSION = data;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainPlatform').classList.remove('hidden');
    document.getElementById('userDisplay').innerHTML = `👤 <b>${data.name}</b>`;
    initPlatform();
}

function logout() { location.reload(); }

// ====================== PLATFORM ======================
function initPlatform() {
    buildMainTabs();
    switchSection('production');
}

function buildMainTabs() {
    document.getElementById('mainTabs').innerHTML = `
        <div class="tab active" onclick="switchSection('production')">🛠 Production</div>
        <div class="tab" onclick="switchSection('vendor')">📦 Vendor Management</div>
    `;
}

function switchSection(sec) {
    currentSection = sec;
    document.getElementById('section-production').classList.toggle('hidden', sec!=='production');
    document.getElementById('section-vendor').classList.toggle('hidden', sec!=='vendor');
    if (sec==='production') loadProduction();
    if (sec==='vendor') loadVendor();
}

// ====================== PRODUCTION ======================
function loadProduction() {
    const tabsHTML = `
        <div class="tab active" onclick="showProdTab(0)">Entry Form</div>
        <div class="tab" onclick="showProdTab(1)">Dashboard</div>
        <div class="tab" onclick="showProdTab(2)">Layout</div>
    `;
    document.getElementById('prodTabs').innerHTML = tabsHTML;
    showProdTab(0);
}

function showProdTab(n) {
    const content = document.getElementById('prodContent');
    if (n===0) buildEntryForm(content);
    if (n===1) buildProdDashboard(content);
    if (n===2) buildLayoutEditor(content);
}

function buildEntryForm(container) {
    let html = `<h2>Production Data Entry</h2>
        <div style="display:flex;gap:15px;margin:15px 0;">
            <input type="date" id="prodDate" value="${new Date().toISOString().split('T')[0]}">
            <button onclick="submitProduction()" class="btn-primary">Submit to Sheet</button>
            <button onclick="clearProdForm()" class="btn-danger">Clear</button>
        </div>
        <div style="overflow-x:auto;"><table id="prodTable"><thead><tr><th>Person</th>`;
    for(let i=1;i<=5;i++) html += `<th>Product ${i}</th><th>Qty</th>`;
    html += `</tr></thead><tbody id="prodTbody"></tbody></table></div>`;
    container.innerHTML = html;

    const tbody = document.getElementById('prodTbody');
    prodLayout.forEach(stage => {
        const hr = document.createElement('tr');
        hr.innerHTML = `<td colspan="11" style="background:${stage.color};color:white;text-align:center;font-weight:600;padding:12px;">${stage.stage}</td>`;
        tbody.appendChild(hr);

        stage.persons.forEach(person => {
            let row = `<tr><td style="font-weight:600;">${person}</td>`;
            for(let i=0;i<5;i++) {
                row += `<td><input type="text" class="item" placeholder="Item"></td><td><input type="number" class="qty" style="width:80px;" oninput="updateProdTotals()"></td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });
    });
}

function updateProdTotals() { /* live total logic */ }

async function submitProduction() {
    showToast("Records submitted to Production Sheet");
}

function clearProdForm() { document.querySelectorAll('#prodTable input').forEach(i=>i.value=''); }

function buildProdDashboard(container) {
    container.innerHTML = `<h2>Production Dashboard</h2><p>KPIs, Charts and Day Log will appear here.</p>`;
}

function buildLayoutEditor(container) {
    container.innerHTML = `<h2>Form Layout Editor</h2><p>Manage stages and persons (saved to sheet).</p>`;
}

// ====================== VENDOR ======================
function loadVendor() {
    const tabsHTML = `
        <div class="tab active" onclick="showVendorTab(0)">Vendor Master</div>
        <div class="tab" onclick="showVendorTab(1)">Invoices</div>
        <div class="tab" onclick="showVendorTab(2)">Payments</div>
        <div class="tab" onclick="showVendorTab(3)">Dashboard</div>
    `;
    document.getElementById('vendorTabs').innerHTML = tabsHTML;
    showVendorTab(0);
}

function showVendorTab(n) {
    const content = document.getElementById('vendorContent');
    if (n===0) renderVendorMaster(content);
    if (n===1) renderInvoices(content);
    if (n===2) renderPayments(content);
    if (n===3) renderVendorDashboard(content);
}

function renderVendorMaster(c) {
    c.innerHTML = `<h2>Vendor Master</h2><button onclick="showAddVendorModal()" class="btn-primary">＋ Add Vendor</button>`;
}

function renderInvoices(c) {
    c.innerHTML = `<h2>Invoices</h2><button onclick="showNewInvoiceModal()" class="btn-primary">＋ New Invoice</button>`;
}

function renderPayments(c) {
    c.innerHTML = `<h2>Payments</h2><button onclick="showPaymentModal()" class="btn-primary">＋ Record Payment</button>`;
}

function renderVendorDashboard(c) {
    c.innerHTML = `<h2>Vendor Dashboard</h2><p>Outstanding Summary</p>`;
}

// ====================== MODALS ======================
function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function showAddVendorModal() { showModal(`<h3>Add Vendor</h3><p>Modal ready for full form.</p><button onclick="closeModal()">Close</button>`); }
function showNewInvoiceModal() { showModal(`<h3>New Invoice</h3><p>Full invoice form with auto vendor creation.</p>`); }
function showPaymentModal() { showModal(`<h3>Record Payment</h3><p>Partial payment logic included.</p>`); }

function showConfigModal() {
    const html = `
        <h3>Configure URLs</h3>
        <label>Production URL:</label><br>
        <input type="text" id="cfgProd" value="${PROD_URL}" style="width:100%;padding:8px;margin:8px 0;"><br>
        <label>Vendor URL:</label><br>
        <input type="text" id="cfgVendor" value="${VENDOR_URL}" style="width:100%;padding:8px;margin:8px 0;">
        <button onclick="saveConfig()" class="btn-primary">Save</button>
    `;
    showModal(html);
}

function saveConfig() {
    PROD_URL = document.getElementById('cfgProd').value;
    VENDOR_URL = document.getElementById('cfgVendor').value;
    closeModal();
    showToast("URLs updated");
}

// ====================== START ======================
window.onload = () => {
    showToast("Jayco Unified Platform Ready", "#10b981");
};
</script>
</body>
</html>
