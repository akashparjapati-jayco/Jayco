<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayco Vendor Management</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --navy: #0f1f3d;
            --navy-light: #1e3a5f;
            --emerald: #10b981;
            --purple: #8b5cf6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background:#f8fafc; color:#1e2937; }
        .topbar {
            background: linear-gradient(90deg, var(--navy), var(--navy-light));
            color: white;
            height: 65px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .logo { width:50px; height:50px; background:white; color:var(--navy); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; margin-right:12px; }
        .tabs { display:flex; background:white; border-bottom:1px solid #e2e8f0; }
        .tab {
            padding:16px 24px;
            cursor:pointer;
            font-weight:600;
            color:#64748b;
        }
        .tab.active {
            color: var(--navy);
            border-bottom:4px solid var(--emerald);
        }
        .content { padding:20px; max-width:1480px; margin:0 auto; }
        .hidden { display:none !important; }

        .modal {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:2000;
        }
        .modal-content {
            background:white; border-radius:12px; width:90%; max-width:620px; max-height:92vh; overflow:auto;
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
        }
        button {
            padding:10px 18px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:500;
        }
        .btn-primary { background:#10b981; color:white; }
        .btn-danger { background:#ef4444; color:white; }
        .status-paid { background:#10b981; color:white; padding:3px 10px; border-radius:9999px; font-size:13px; }
        .status-partial { background:#f59e0b; color:white; padding:3px 10px; border-radius:9999px; font-size:13px; }
        .status-pending { background:#3b82f6; color:white; padding:3px 10px; border-radius:9999px; font-size:13px; }
        .status-overdue { background:#ef4444; color:white; padding:3px 10px; border-radius:9999px; font-size:13px; }
    </style>
</head>
<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="logo">J</div>
        <div>
            <strong>JAYCO ENGINEERING</strong><br>
            <small>Vendor Management System</small>
        </div>
        <div style="margin-left:auto; display:flex; align-items:center; gap:15px;">
            <span id="userInfo" style="font-size:14px;"></span>
            <button onclick="logout()" style="background:rgba(255,255,255,0.2); color:white;">Logout</button>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div style="height:100vh; background:linear-gradient(135deg, #1e2937, #334155); display:flex; align-items:center; justify-content:center; color:white;">
            <div style="background:white; color:#1e2937; padding:40px; border-radius:16px; width:380px; text-align:center;">
                <div class="logo" style="margin:0 auto 20px; width:80px; height:80px; font-size:42px;">J</div>
                <h2>JAYCO Vendor System</h2>
                <input type="text" id="username" placeholder="Username" style="width:100%; padding:14px; margin:15px 0; border:1px solid #ccc; border-radius:8px;">
                <input type="password" id="password" placeholder="Password" style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">
                <button onclick="login()" style="width:100%; padding:14px; background:#10b981; color:white; font-size:16px; margin-top:10px;">Sign In</button>
                <button onclick="showSettingsModal()" style="margin-top:15px; background:none; border:1px solid #64748b; color:#64748b;">⚙ Settings</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
        <div class="tabs" id="moduleTabs"></div>
        <div class="content">
            <!-- Vendor Master -->
            <div id="tab-vendor" class="tab-content">
                <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="text" id="vendorSearch" placeholder="Search GSTIN or Name..." onkeyup="filterVendors()" style="padding:10px; width:300px;">
                    <button onclick="showAddVendorModal()" class="btn-primary">＋ Add Vendor</button>
                </div>
                <table style="width:100%; border-collapse:collapse; background:white;" id="vendorTable">
                    <thead><tr style="background:#f1f5f9;">
                        <th>GSTIN</th><th>Vendor Name</th><th>Category</th><th>Credit Days</th><th>Status</th><th>Action</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Invoices Tab -->
            <div id="tab-invoice" class="tab-content hidden">
                <button onclick="showNewInvoiceModal()" class="btn-primary">＋ New Invoice</button>
                <button onclick="showImportModal()" style="margin-left:10px;">Import from Tally</button>
                <table style="width:100%; margin-top:15px;" id="invoiceTable"></table>
            </div>

            <!-- Payments Tab -->
            <div id="tab-payment" class="tab-content hidden">
                <button onclick="showPaymentModal()" class="btn-primary">＋ Record Payment</button>
                <table style="width:100%; margin-top:15px;" id="paymentTable"></table>
            </div>

            <!-- Dashboard -->
            <div id="tab-dashboard" class="tab-content hidden">
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:20px;">
                    <div style="background:linear-gradient(135deg,#ef4444,#f87171); color:white; padding:25px; border-radius:12px;">
                        <h3>Total Outstanding</h3>
                        <h2 id="kpiTotal">₹0</h2>
                    </div>
                    <div style="background:linear-gradient(135deg,#f59e0b,#fbbf24); color:white; padding:25px; border-radius:12px;">
                        <h3>Overdue</h3>
                        <h2 id="kpiOverdue">₹0</h2>
                    </div>
                    <div style="background:linear-gradient(135deg,#3b82f6,#60a5fa); color:white; padding:25px; border-radius:12px;">
                        <h3>Due in 15 Days</h3>
                        <h2 id="kpiDueSoon">₹0</h2>
                    </div>
                    <div style="background:linear-gradient(135deg,#10b981,#34d399); color:white; padding:25px; border-radius:12px;">
                        <h3>Vendors</h3>
                        <h2 id="kpiVendors">0</h2>
                    </div>
                </div>
                <h3 style="margin:25px 0 10px;">Outstanding by Vendor</h3>
                <table id="outstandingTable" style="width:100%;"></table>
            </div>

            <!-- Admin Tabs -->
            <div id="tab-users" class="tab-content hidden">User Management (Admin Only)</div>
        </div>
    </div>

    <!-- Modals will be added dynamically via JS -->

    <div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:12px 24px;border-radius:8px;display:none;z-index:3000;"></div>

    <script>
        const VENDOR_URL = "https://script.google.com/macros/s/AKfycbzmLsJXmEx5Y4YkJx16L38287N3VFcTLUnriMlWYN5Rda6zhE35jR157SYuEln4KrPT/exec";

        let SESSION = null;
        let VENDORS = [], INVOICES = [], PAYMENTS = [], OUTSTANDING = [];
        let SAVING = false;

        function showToast(msg, color = "#10b981") {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function apiCall(params, body = null) {
            let url = VENDOR_URL;
            if (params) url += (url.includes('?') ? '&' : '?') + params;

            const options = { redirect: 'follow' };
            if (body) {
                options.method = 'POST';
                options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
                options.body = JSON.stringify(body);
            }

            try {
                const res = await fetch(url, options);
                return await res.json();
            } catch(e) {
                console.error(e);
                showToast("Connection error", "#ef4444");
                return null;
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return showToast("Enter credentials", "#ef4444");

            const data = await apiCall(`action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
            if (data && data.status === 'ok') {
                SESSION = data;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userInfo').textContent = `👤 ${data.name}`;
                buildTabs();
                loadAllData();
            } else {
                showToast("Invalid credentials", "#ef4444");
            }
        }

        function logout() {
            SESSION = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function buildTabs() {
            const container = document.getElementById('moduleTabs');
            container.innerHTML = '';

            if (SESSION.modules.includes('vendor')) {
                const tabs = [
                    {id:'vendor', name:'Vendor Master'},
                    {id:'invoice', name:'Invoices'},
                    {id:'payment', name:'Payments'},
                    {id:'dashboard', name:'Dashboard'}
                ];
                tabs.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'tab';
                    div.textContent = t.name;
                    div.onclick = () => switchTab(t.id);
                    container.appendChild(div);
                });
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            if (tabId === 'dashboard') loadOutstanding();
        }

        async function loadAllData() {
            const [v, i, p] = await Promise.all([
                apiCall('action=vendors'),
                apiCall('action=invoices'),
                apiCall('action=payments')
            ]);

            if (v) VENDORS = v.vendors || [];
            if (i) INVOICES = i.invoices || [];
            if (p) PAYMENTS = p.payments || [];

            renderVendors();
            renderInvoices();
            renderPayments();
        }

        async function loadOutstanding() {
            const res = await apiCall('action=outstanding');
            if (res && res.status === 'ok') {
                OUTSTANDING = res.outstanding || [];
                renderDashboard(res);
            }
        }

        function renderDashboard(data) {
            document.getElementById('kpiTotal').textContent = '₹' + (data.totals?.total || 0).toLocaleString('en-IN');
            document.getElementById('kpiOverdue').textContent = '₹' + (data.totals?.overdue || 0).toLocaleString('en-IN');
            document.getElementById('kpiDueSoon').textContent = '₹' + (data.totals?.dueSoon || 0).toLocaleString('en-IN');
            document.getElementById('kpiVendors').textContent = OUTSTANDING.length;
            // Render table...
        }

        function renderVendors() {
            // Full implementation would go here
            console.log("Vendors loaded:", VENDORS.length);
        }

        function renderInvoices() { console.log("Invoices loaded"); }
        function renderPayments() { console.log("Payments loaded"); }

        function showSettingsModal() {
            alert("Settings Modal - URL Configuration (to be expanded)");
        }

        // Placeholder modals
        function showAddVendorModal() { alert("Add Vendor Modal"); }
        function showNewInvoiceModal() { alert("New Invoice Modal"); }
        function showPaymentModal() { alert("Record Payment Modal"); }
        function showImportModal() { alert("Import from Tally Modal"); }

        window.onload = () => {
            showToast("Jayco Vendor System Ready", "#10b981");
        };
    </script>
</body>
</html>
